---
# =============================================================================
# Proxmox Setup Playbook
#
# Single entrypoint: ansible-playbook playbooks/proxmox.yml
# =============================================================================

- name: "Proxmox setup"
  hosts: proxmox
  gather_facts: true
  tasks:
    - name: Disable Proxmox enterprise repo
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/pve-enterprise.list
        state: absent

    - name: Disable Ceph enterprise repo
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/ceph.list
        state: absent

    - name: Check if subscription nag already patched
      ansible.builtin.command:
        cmd: grep -q 'orig_cmd();' /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
      register: nag_patched
      failed_when: false
      changed_when: false

    - name: Remove subscription nag
      ansible.builtin.shell:
        cmd: >-
          sed -Ezi.bak
          "s/(function ?\(orig_cmd\) \{)/\1\n\torig_cmd\(\);\n\treturn;/g"
          /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
      when: nag_patched.rc != 0
      notify: Restart pveproxy

    - name: Get existing PVE users
      ansible.builtin.command:
        cmd: pveum user list --output-format json
      register: pve_users
      changed_when: false

    - name: Create terraform@pve user
      ansible.builtin.command:
        cmd: pveum user add terraform@pve
      when: "'terraform@pve' not in pve_users.stdout"

    - name: Get existing PVE roles
      ansible.builtin.command:
        cmd: pveum role list --output-format json
      register: pve_roles
      changed_when: false

    - name: Create Terraform role
      ansible.builtin.command:
        cmd: >-
          pveum role add Terraform -privs
          "Realm.AllocateUser, VM.PowerMgmt, Sys.Console, Sys.Audit,
          Sys.AccessNetwork, VM.Config.Cloudinit, Pool.Allocate, SDN.Audit,
          Realm.Allocate, SDN.Use, Mapping.Modify, VM.Config.Memory,
          VM.Allocate, SDN.Allocate, VM.Console, VM.Clone, VM.Backup,
          Datastore.AllocateTemplate, VM.Snapshot, VM.Config.Network,
          Sys.Incoming, Sys.Modify, VM.Snapshot.Rollback, VM.Config.Disk,
          Datastore.Allocate, VM.Config.CPU, VM.Config.CDROM, Group.Allocate,
          Datastore.Audit, VM.Migrate, Mapping.Use, Datastore.AllocateSpace,
          Sys.Syslog, VM.Config.Options, Pool.Audit, User.Modify,
          VM.Config.HWType, VM.Audit, Sys.PowerMgmt, Mapping.Audit,
          Permissions.Modify"
      when: "'Terraform' not in pve_roles.stdout"

    - name: Assign Terraform role to terraform@pve on /
      ansible.builtin.command:
        cmd: pveum aclmod / -user terraform@pve -role Terraform
      changed_when: false

    - name: Get existing terraform@pve tokens
      ansible.builtin.command:
        cmd: pveum user token list terraform@pve --output-format json
      register: pve_tokens
      changed_when: false
      failed_when: false

    - name: Create terraform provider token
      ansible.builtin.command:
        cmd: pveum user token add terraform@pve provider --privsep=0 --output-format json
      register: terraform_token
      when: "'provider' not in pve_tokens.stdout"

    - name: Save terraform token to controller
      ansible.builtin.copy:
        content: "{{ terraform_token.stdout }}"
        dest: "{{ playbook_dir }}/../../.secrets/terraform_token_{{ inventory_hostname }}.json"
        mode: "0600"
      delegate_to: localhost
      when: terraform_token is changed

    - name: Ping
      ansible.builtin.ping:

    - name: Setup zsh
      ansible.builtin.include_role:
        name: zsh

  handlers:
    - name: Restart pveproxy
      ansible.builtin.systemd:
        name: pveproxy
        state: restarted
